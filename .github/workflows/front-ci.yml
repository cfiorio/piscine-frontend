name: CI/CD — Frontend

on:
  push:
    branches: [main]

env:
  IMAGE_NAME: cfiorio/piscine-frontend

jobs:
  # ─── Build & Push vers GHCR ──────────────────────────────────────────────
  build-push:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Métadonnées de l'image
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build et push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BASE_HREF=/new/
          cache-from: type=registry,ref=ghcr.io/${{ env.IMAGE_NAME }}:latest
          cache-to: type=inline

  # ─── Déploiement sur le VPS ───────────────────────────────────────────────
  deploy:
    name: Deploy VPS
    needs: build-push
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Copier le compose sur le VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: docker-compose.front.yml
          target: /srv/piscine-front/

      - name: Déployer le frontend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u cfiorio --password-stdin

            cd /srv/piscine-front

            docker compose -f docker-compose.front.yml pull
            docker compose -f docker-compose.front.yml up -d

            docker image prune -f
