<!-- En-tête festival -->
<div class="festival-header" aria-label="Festival sélectionné">
  <mat-icon class="festival-icon" aria-hidden="true">celebration</mat-icon>
  <div class="festival-info">
    <span class="festival-label">Festival en cours</span>
    <span class="festival-name">{{ festivalName }}</span>
  </div>
</div>

<mat-divider />

<!-- Navigation visiteur -->
<nav aria-label="Navigation du festival">
  <mat-nav-list>
    @for (item of visibleItems(); track item.route) {
      <a
        mat-list-item
        [routerLink]="item.route"
        routerLinkActive="active-link"
        [attr.aria-label]="item.label"
      >
        <mat-icon matListItemIcon aria-hidden="true">{{ item.icon }}</mat-icon>
        <span matListItemTitle>{{ item.label }}</span>
      </a>
    }
  </mat-nav-list>
</nav>

<!-- Séparateur section admin -->
@if (auth.isAuthenticated()) {
  <mat-divider />
  <div class="section-label" aria-hidden="true">Administration</div>
}
