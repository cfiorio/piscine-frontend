<mat-sidenav-container class="app-container" autosize>

  <!-- Sidenav gauche : menu contextuel festival -->
  <mat-sidenav
    [mode]="sidenavMode()"
    [opened]="drawerOpened()"
    (closedStart)="onDrawerClose()"
    class="app-sidenav"
    role="navigation"
    aria-label="Menu contextuel du festival"
  >
    <app-side-nav />
  </mat-sidenav>

  <!-- Contenu principal -->
  <mat-sidenav-content class="app-content">
    <!-- Barre du haut -->
    <app-top-navbar (menuToggle)="onMenuToggle()" />

    <!-- Zone de contenu des pages -->
    <main class="app-main" id="main-content" tabindex="-1">
      <router-outlet />
    </main>
  </mat-sidenav-content>

</mat-sidenav-container>
