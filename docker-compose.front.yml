services:
  piscine_front:
    image: ghcr.io/cfiorio/piscine-frontend:latest
    container_name: piscine_front
    restart: unless-stopped
    environment:
      PORT: 4000
    networks: [piscinephp_net]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/new/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

networks:
  piscinephp_net:
    external: true
